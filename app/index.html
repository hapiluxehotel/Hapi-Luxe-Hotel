<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hapi Luxe App</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="app.css">

  <meta name="theme-color" content="#d6b98c">
</head>

<body>

<div class="welcome-screen">

  <div class="overlay"></div>

  <div class="content">

    <h1>Hapi Luxe</h1>

    <p class="subtitle">
      Welcome to Hapi Luxe Hotel
    </p>

    <button id="enterBtn">
      ENTER EXPERIENCE
    </button>

  </div>

</div>

<div class="home-screen hidden">

  <div class="topbar">
    <h1>Hapi Luxe</h1>
    <p>Boutique Hotel Experience</p>
  </div>

  <div class="menu-grid">

    <div class="menu-card" onclick="openService('room')">      <span>🛎️</span>
      <h3>Room Service</h3>
    </div>

   <div class="menu-card" onclick="openService('guide')">
      <span>📖</span>
      <h3>Hotel Guide</h3>
    </div>

    <div class="menu-card" onclick="openService('nearby')">
      <span>📍</span>
      <h3>Nearby Places</h3>
    </div>

    <div class="menu-card" onclick="openService('cafe')">
      <span>☕</span>
      <h3>Cafe & Drinks</h3>
    </div>

    <div class="menu-card" onclick="openService('support')">
      <span>💬</span>
      <h3>Support</h3>
    </div>

    <div class="menu-card" onclick="openService('checkout')">
      <span>🚪</span>
      <h3>Fast Checkout</h3>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
