<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hapi Luxe App</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="app.css">

  <meta name="theme-color" content="#d6b98c">
</head>

<body>

<div class="welcome-screen">

  <div class="overlay"></div>

  <div class="content">

    <h1>Hapi Luxe</h1>

    <p class="subtitle">
      Welcome to Hapi Luxe Hotel
    </p>

    <button id="enterBtn">
      ENTER EXPERIENCE
    </button>

  </div>

</div>

<div class="home-screen hidden">

  <div class="topbar">
    <h1>Hapi Luxe</h1>
    <p>Boutique Hotel Experience</p>
  </div>

  <div class="menu-grid">

    <div class="menu-card"
onclick="window.location.href='https://hapiluxehotel.github.io/Hapi-Luxe-Hotel/index.html#top'">      
      <span>🖥</span>
     <h3>Trang Web</h3>
<p class="sub-text">Website</p>
    </div>

     <div class="menu-card"
onclick="window.location.href='https://drive.google.com/file/d/1A15LOZuMr5umSSQa7cj7oz0sa5aKrPRy/view?usp=sharing'">
      <span>📖</span>
      <h3>Hướng Dẫn Khách Sạn</h3>
<p class="sub-text">Hotel Guide</p>
    </div>

    <div class="menu-card" onclick="window.location.href='nearby.html'">
      <span>📍</span>
      <h3>Địa Điểm Gần Đây</h3>
<p class="sub-text">Nearby Places</p>
    </div>

    <div class="menu-card"
onclick="window.location.href='https://drive.google.com/file/d/1oGN2A_yOciWSRGQqs5doJ8yawpFxzPjc/view?usp=sharing'">
      <span>🚪</span>
      <h3>Hạng Phòng Khác</h3>
<p class="sub-text">Guest Room Class</p>
    </div>
    
    <div class="menu-card" onclick="openService('support')">
      <span>💬</span>
      <h3>Hỗ Trợ</h3>
<p class="sub-text">Support</p>
    </div>
    
<div class="menu-card" onclick="openService('cafe')">
      <span>☕</span>
     <h3>Cà Phê & Đồ Uống</h3>
<p class="sub-text">Cafe & Drinks</p>
    </div>
    
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
